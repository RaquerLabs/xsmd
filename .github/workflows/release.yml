name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      - name: Build binary
        run: |
          BINARY_NAME="xsmd"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="xsmd.exe"
          fi

          # Output directory
          OUT_DIR="dist/${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$OUT_DIR"

          # Compile
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o "$OUT_DIR/$BINARY_NAME" ./cmd/xsmd-lsp

          # Create archive
          cd dist
          ARCHIVE_NAME="xsmd-lsp-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j "${ARCHIVE_NAME}.zip" "${{ matrix.goos }}_${{ matrix.goarch }}/$BINARY_NAME"
          else
            tar -czvf "${ARCHIVE_NAME}.tar.gz" -C "${{ matrix.goos }}_${{ matrix.goarch }}" "$BINARY_NAME"
          fi
          cd ..

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
