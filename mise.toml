[settings]
disable_tools = ["go"]

[tools]
"go:golang.org/x/tools/cmd/goimports" = "latest"

[tasks.build]
description = "Compile the LSP binary locally"
run = "go build -o dist/xsmd ./cmd/xsmd-lsp"

[tasks.install]
description = "Install globally so Neovim can launch it from anywhere"
run = "go build -o ~/go/bin/xsmd ./cmd/xsmd-lsp"

[tasks.format]
description = "Format code and organize imports"
run = "goimports -w . && go fmt ./..."

[tasks.tidy]
description = "Download missing modules and remove unused ones"
run = "go mod tidy"

[tasks.test]
description = "Run the unit test suite"
run = "go test -v ./..."

[tasks.test-coverage]
run = """
go test -v -coverprofile=cover.out ./...
go tool cover -func=cover.out
"""

[tasks.test-coverage-html]
run = """
go test -v -coverprofile=cover.out ./...
go tool cover -html=cover.out
"""

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf dist/"
